name: Deploy PRD

on:
  push:
    branches: [prd]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Force deploy API"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      deploy_ui:
        description: "Force deploy UI"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: shanhuai-prd
  cancel-in-progress: false

env:
  CARGO_BUILD_JOBS: "1"
  PRD_HOST: 36.151.143.235
  PUBLIC_WEB_URL: http://36.151.143.235:30081
  API_CACHE_DIR: /srv/shanhuai-ci/buildkit-cache/api
  MIGRATE_CACHE_DIR: /srv/shanhuai-ci/buildkit-cache/migrate
  UI_CACHE_DIR: /srv/shanhuai-ci/buildkit-cache/ui

jobs:
  deploy:
    name: Build changed images and deploy to K3s
    runs-on: [self-hosted, shanhuai-ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            api_changed="${{ inputs.deploy_api }}"
            ui_changed="${{ inputs.deploy_ui }}"
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            zero_sha="0000000000000000000000000000000000000000"

            if [ "$before" = "$zero_sha" ]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after")"
            else
              changed_files="$(git diff --name-only "$before" "$after")"
            fi

            echo "$changed_files"

            api_changed=false
            ui_changed=false

            if echo "$changed_files" | grep -Eq '^(api/|deploy/k3s/|\.github/workflows/deploy-prd\.yml)'; then
              api_changed=true
            fi

            if echo "$changed_files" | grep -Eq '^(ui/|deploy/k3s/|\.github/workflows/deploy-prd\.yml)'; then
              ui_changed=true
            fi
          fi

          echo "api_changed=$api_changed" >> "$GITHUB_OUTPUT"
          echo "ui_changed=$ui_changed" >> "$GITHUB_OUTPUT"
          echo "api_changed=$api_changed"
          echo "ui_changed=$ui_changed"

      - name: Stop when nothing deployable changed
        if: steps.changes.outputs.api_changed != 'true' && steps.changes.outputs.ui_changed != 'true'
        run: echo "No API/UI/deploy changes detected. Nothing to deploy."

      - name: Prepare Docker cache directories
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.ui_changed == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$API_CACHE_DIR" "$MIGRATE_CACHE_DIR" "$UI_CACHE_DIR"
          rm -rf "$API_CACHE_DIR-new" "$MIGRATE_CACHE_DIR-new" "$UI_CACHE_DIR-new"

      - name: Build API and migration images
        if: steps.changes.outputs.api_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          api_image="shanhuai-api:prd-$short_sha"
          migrate_image="shanhuai-migrate:prd-$short_sha"

          docker buildx build \
            --builder default \
            --load \
            --tag "$api_image" \
            --cache-from "type=local,src=$API_CACHE_DIR" \
            --cache-to "type=local,dest=$API_CACHE_DIR-new,mode=max" \
            ./api

          docker buildx build \
            --builder default \
            --load \
            --tag "$migrate_image" \
            --file ./api/Dockerfile.migrate \
            --cache-from "type=local,src=$MIGRATE_CACHE_DIR" \
            --cache-to "type=local,dest=$MIGRATE_CACHE_DIR-new,mode=max" \
            ./api

          rm -rf "$API_CACHE_DIR" "$MIGRATE_CACHE_DIR"
          mv "$API_CACHE_DIR-new" "$API_CACHE_DIR"
          mv "$MIGRATE_CACHE_DIR-new" "$MIGRATE_CACHE_DIR"

          echo "API_IMAGE=$api_image" >> "$GITHUB_ENV"
          echo "MIGRATE_IMAGE=$migrate_image" >> "$GITHUB_ENV"

      - name: Import API images into K3s
        if: steps.changes.outputs.api_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker save "$API_IMAGE" "$MIGRATE_IMAGE" \
            | gzip -1 \
            | ssh root@"$PRD_HOST" 'gzip -d | k3s ctr images import -'

      - name: Ensure K3s app manifests exist
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.ui_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app get deployment/shanhuai-api deployment/shanhuai-ui >/dev/null 2>&1"; then
            echo "K3s app deployments already exist."
          else
            ssh root@"$PRD_HOST" 'cat > /tmp/shanhuai-app.yaml && k3s kubectl apply -f /tmp/shanhuai-app.yaml' < deploy/k3s/shanhuai-app.yaml
          fi

      - name: Run database migrations
        if: steps.changes.outputs.api_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          job="shanhuai-migrate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          ssh root@"$PRD_HOST" "cat <<YAML | k3s kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $job
            namespace: shanhuai-app
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 86400
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: $MIGRATE_IMAGE
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: shanhuai-app-secret
                            key: DATABASE_URL
          YAML"

          if ! ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app wait --for=condition=complete job/$job --timeout=10m"; then
            ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app logs job/$job --all-containers=true --tail=200 || true"
            exit 1
          fi

      - name: Deploy API
        if: steps.changes.outputs.api_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app set image deployment/shanhuai-api api=$API_IMAGE"
          ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app rollout status deployment/shanhuai-api --timeout=8m"

      - name: Build UI image
        if: steps.changes.outputs.ui_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          ui_image="shanhuai-ui:prd-$short_sha"

          docker buildx build \
            --builder default \
            --load \
            --tag "$ui_image" \
            --build-arg "VITE_API_URL=$PUBLIC_WEB_URL" \
            --cache-from "type=local,src=$UI_CACHE_DIR" \
            --cache-to "type=local,dest=$UI_CACHE_DIR-new,mode=max" \
            ./ui

          rm -rf "$UI_CACHE_DIR"
          mv "$UI_CACHE_DIR-new" "$UI_CACHE_DIR"

          echo "UI_IMAGE=$ui_image" >> "$GITHUB_ENV"

      - name: Import UI image into K3s
        if: steps.changes.outputs.ui_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker save "$UI_IMAGE" \
            | gzip -1 \
            | ssh root@"$PRD_HOST" 'gzip -d | k3s ctr images import -'

      - name: Deploy UI
        if: steps.changes.outputs.ui_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app set image deployment/shanhuai-ui ui=$UI_IMAGE"
          ssh root@"$PRD_HOST" "k3s kubectl -n shanhuai-app rollout status deployment/shanhuai-ui --timeout=5m"

      - name: Verify public endpoint
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.ui_changed == 'true'
        run: |
          set -euo pipefail
          curl -fsS --connect-timeout 10 "$PUBLIC_WEB_URL/" >/dev/null
          curl -fsS --connect-timeout 10 "$PUBLIC_WEB_URL/health" >/dev/null
